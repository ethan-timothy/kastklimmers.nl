<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="icon" href="assets/icons/logo.png" type="png/jpeg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"

    />
    <title>Galerij | KastKlimmers</title>
  </head>

  <body>
    <header class="header">
      <div class="logo">
        <a href="index.html"><img src="assets/icons/logo.png" alt="" /></a>
      </div>

      <div class="navigation">
        <input type="checkbox" class="toggle-menu" />
        <div class="hamburger"></div>

        <ul class="menu">
          <li><a href="index.html">Thuis</a></li>
          <li><a href="#">Galerij</a></li>
          <li><a class="nav-cta" href="#form-container">Contact</a></li>
        </ul>
      </div>
    </header>

    <div class="gallery-heading">
      <h2>Momenten van impact</h2>
      <p>Ons team in actie.</p>
    </div>

    <div class="gallery-images">
      <img src="assets/images/img-1.jpg" alt="Image 1" />
      <img src="assets/images/img-2.jpg" alt="Image 2" />
      <img src="assets/images/img-3.jpg" alt="Image 3" />
      <img src="assets/images/img-4.jpg" alt="Image 4" />
      <img src="assets/images/img-5.jpg" alt="Image 5" />
      <img src="assets/images/img-6.jpg" alt="Image 6" />
      <img src="assets/images/hero-img.jpg" alt="Image 7" />
      <img src="assets/images/img-8.jpg" alt="Image 8" />
      <img src="assets/images/img-10.jpeg" alt="Image 10" />
      <img src="assets/images/img-11.jpeg" alt="Image 11" />
      <img src="assets/images/img-12.jpeg" alt="Image 12" />
    </div>

    <div class="form-container" id="form-container">
      <h3>neem contact op met ons team</h3>
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSf3MkKpswWU-9lfSPqHQ-VGJy5p94m1cdEGZ2FSphuHEt2WeQ/viewform?embedded=true"
        width="640"
        height="1465"
        frameborder="0"
        marginheight="0"
        marginwidth="0"
        >Loading…</iframe
      >
    </div>

    <div class="last-card">
      <div class="cta-card">
        <h4>Je vogelnest is vlakbij.</h4>
        <ul>
          <li>
            <a class="primary-btn" href="index.html#hero-section">Get one</a>
          </li>
          <li><a class="secondary-btn" href="#form-container">Contact</a></li>
        </ul>
      </div>
    </div>

    <div class="socials">
      <a target="_blank" href="https://mas.to/@iwein"
        ><img src="assets/icons/logo-mastodon.svg" alt="Mastodon"
      /></a>
      <a target="_blank" href="https://mas.to/@iwein"
        ><img src="assets/icons/fedi-logo.svg" alt="fedi-logo"
      /></a>
      <a target="_blank" href="https://mas.to/@iwein"
        ><img src="assets/icons/logo-bluesky.svg" alt="bluesky"
      /></a>
    </div>
    <hr />

    <footer>
      <div class="upper-footer">
        <h4>Snelle Links</h4>
        <ul>
          <li><a href="index.html">Thuis</a></li>
          <li><a href="#">Galerij</a></li>
          <li><a href="#form-container">Contact</a></li>
        </ul>
      </div>
      <hr />
      <p>
        Met trots gemaakt door Ethan met ❤️ voor een betere wereld. | &copy;2026
      </p>
    </footer>
    <script src="assets/javascript/app.js"></script>
